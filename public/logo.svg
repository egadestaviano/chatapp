<svg
  width="512"
  height="512"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="bubbleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF41" />
      <stop offset="100%" stop-color="#2ECC71" />
    </linearGradient>
  </defs>
  <rect x="5" y="5" width="90" height="90" rx="4" fill="#0A0A0A" />
  <rect x="5" y="5" width="90" height="90" rx="4" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.3" />
  <g filter="url(#bubbleShadow)">
    <path
      d="M20 25H65V55H32L20 67V25Z"
      stroke="#FFFFFF"
      stroke-width="3"
      stroke-linejoin="miter"
      fill="#0A0A0A"
    />
    <rect x="28" y="34" width="28" height="2.5" fill="#FFFFFF" fill-opacity="0.3" />
    <rect x="28" y="42" width="22" height="2.5" fill="#FFFFFF" fill-opacity="0.3" />
  </g>
  <g filter="url(#neonGlow)">
    <path
      d="M35 45H80V75L68 87V75H35V45Z"
